<!DOCTYPE html>
<html lang="bg" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2B Каталог | Цветкови Клийнинг</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              blue: '#1E3A8A',    /* 30% Corporate Blue */
              light: '#F8FAFC',   /* 60% White/Off-white */
              yellow: '#FACC15',  /* 10% CTA Yellow */
              agency: '#EC4899'
            }
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="css/main.css">

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-brand-light text-slate-800 font-sans antialiased">

  <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <div class="bg-brand-blue text-white p-2 rounded-lg font-bold">ЦК</div>
        <div class="font-bold text-brand-blue text-lg leading-tight">Цветкови<br><span class="text-xs text-brand-yellow uppercase tracking-widest">Каталог</span></div>
      </a>
      <a href="index.html#contact" class="bg-brand-yellow text-slate-900 px-5 py-2 rounded-md font-bold hover:bg-yellow-400 transition shadow-md">
        Обратно към Офертите →
      </a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-12" x-data="catalogLogic()">
    
    <div class="mb-10 text-center">
      <h1 class="text-4xl font-extrabold text-brand-blue mb-4">Индустриален Асортимент</h1>
      <p class="text-slate-500 max-w-2xl mx-auto text-lg">
        Разгледайте нашите наличности. Цените варират според обема. Заявете артикулите, които ви интересуват, и ще получите персонализирана B2B цена до 2 часа.
      </p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row gap-4">
      <input 
        x-model="searchQuery" 
        type="text" 
        placeholder="🔍 Търси препарат, хартия, дозатор..." 
        class="flex-1 px-4 py-3 rounded-md border border-slate-300 focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20 outline-none text-lg"
      >
      <select x-model="selectedCategory" class="px-4 py-3 rounded-md border border-slate-300 bg-white font-semibold text-brand-blue outline-none cursor-pointer">
        <option value="all">Всички Категории</option>
        <option value="chemicals">Химия и Препарати</option>
        <option value="paper">Санитарна Хартия</option>
        <option value="dispensers">Дозатори</option>
      </select>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <template x-for="item in filteredItems" :key="item.id">
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:shadow-lg transition flex flex-col">
          
          <div class="flex justify-between items-start mb-4">
            <span class="text-xs font-bold uppercase tracking-widest text-slate-400" x-text="item.categoryLabel"></span>
            
            <span x-show="item.inStock" class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded font-bold">На склад</span>
            <span x-show="!item.inStock" class="bg-orange-100 text-orange-800 text-xs px-2 py-1 rounded font-bold">По заявка (24ч)</span>
          </div>
          
          <h3 class="text-xl font-bold text-brand-blue mb-2" x-text="item.name"></h3>
          <p class="text-slate-500 text-sm mb-6 flex-1" x-text="item.desc"></p>
          
          <a :href="'index.html?product=' + encodeURIComponent(item.name) + '#contact'" class="block w-full text-center bg-white border-2 border-vibe-indigo text-vibe-indigo font-black py-3 rounded-xl hover:bg-vibe-indigo hover:text-white transition-all shadow-sm transform hover:-translate-y-1">
  Поискай B2B Цена ⚡
</a>
        </div>
      </template>

      <div x-show="filteredItems.length === 0" class="col-span-full text-center py-12">
        <p class="text-slate-400 text-lg">Няма намерени продукти по вашия критерий.</p>
      </div>
    </div>
  </main>

  <script src="js/catalog.js"></script>
</body>
</html>
